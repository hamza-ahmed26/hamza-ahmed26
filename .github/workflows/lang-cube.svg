<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360" font-family="'Segoe UI', sans-serif">
  <defs>
    <style>
      @keyframes spin {
        0%   { transform: rotateX(-22deg) rotateY(0deg); }
        100% { transform: rotateX(-22deg) rotateY(360deg); }
      }
      @keyframes hueShift {
        0%   { stroke: #00E5A0; }
        33%  { stroke: #22d3ee; }
        66%  { stroke: #fb923c; }
        100% { stroke: #00E5A0; }
      }
      @keyframes orbit {
        0%   { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.55; }
        50%      { opacity: 1; }
      }
      .scene {
        transform-style: preserve-3d;
        transform-origin: 300px 180px;
        animation: spin 9s linear infinite;
      }
      .face {
        fill: rgba(13,17,23,0.72);
        stroke-width: 2.5;
        animation: hueShift 6s ease-in-out infinite;
      }
      .edge { stroke-width: 2.5; fill: none; animation: hueShift 6s ease-in-out infinite; }
      .lbl  { font-weight: 700; font-size: 22px; fill: #e6fff5; }
      .orbit-grp { transform-origin: 300px 180px; animation: orbit 14s linear infinite; }
      .orbit-grp.rev { animation: orbit 18s linear infinite reverse; }
      .token { font-size: 15px; font-weight: 700; }
      .glow { animation: pulse 3s ease-in-out infinite; }
    </style>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#13243a"/>
      <stop offset="55%" stop-color="#0d1628"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="600" height="360" rx="18" fill="url(#bg)"/>

  <!-- مدارات حول المكعب -->
  <g class="orbit-grp">
    <text class="token glow" x="300" y="70"  text-anchor="middle" fill="#00E5A0">C++</text>
    <text class="token glow" x="300" y="298" text-anchor="middle" fill="#fb923c">Python</text>
  </g>
  <g class="orbit-grp rev">
    <text class="token glow" x="120" y="186" text-anchor="middle" fill="#22d3ee">C#</text>
    <text class="token glow" x="480" y="186" text-anchor="middle" fill="#a78bfa">Java</text>
  </g>

  <!-- المكعب: وش أمامي + وش جانبي + وش علوي (محاكاة 3D isometric) -->
  <g class="scene">
    <!-- الوش العلوي -->
    <polygon class="face" points="240,120 360,120 392,90 272,90"/>
    <!-- الوش الجانبي -->
    <polygon class="face" points="360,120 360,240 392,210 392,90"/>
    <!-- الوش الأمامي -->
    <rect class="face" x="240" y="120" width="120" height="120" rx="4"/>
    <!-- حواف بارزة -->
    <polyline class="edge" points="240,120 360,120 360,240 240,240 240,120"/>
    <!-- نص على الوش الأمامي -->
    <text class="lbl" x="300" y="188" text-anchor="middle">&lt;/&gt;</text>
  </g>

  <text x="300" y="340" text-anchor="middle" font-size="13" font-weight="700" fill="#6b7a90" letter-spacing="3">L A N G U A G E   S T A C K</text>
</svg>
